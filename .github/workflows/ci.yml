name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build (excluding Tauri UI and MCP)
        run: cargo build --workspace --exclude pidx-ui --exclude pidx-mcp

      - name: Test (excluding Tauri UI and MCP)
        run: cargo test --workspace --exclude pidx-ui --exclude pidx-mcp

      - name: Clippy (excluding Tauri UI and MCP)
        run: cargo clippy --workspace --exclude pidx-ui --exclude pidx-mcp -- -D warnings

      - name: Check schema drift
        run: |
          cargo run --example emit_schema > docs/pidx-schema.json.new
          diff docs/pidx-schema.json docs/pidx-schema.json.new
          rm docs/pidx-schema.json.new
