name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
      
      - name: Format check
        run: cargo fmt --check

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit dependencies
        run: cargo audit

      - name: Build (excluding Tauri UI)
        run: cargo build --workspace --exclude pidx-ui

      - name: Test (excluding Tauri UI)
        run: cargo test --workspace --exclude pidx-ui

      - name: Clippy (excluding Tauri UI)
        run: cargo clippy --workspace --exclude pidx-ui -- -D warnings

      - name: Check schema drift
        shell: bash
        run: |
          cargo run --example emit_schema > docs/pidx-schema.json.new
          diff docs/pidx-schema.json docs/pidx-schema.json.new
          rm docs/pidx-schema.json.new
